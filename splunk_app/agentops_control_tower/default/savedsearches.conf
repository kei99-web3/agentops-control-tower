[Incident Command - Timeline]
search = index=agentops_events incident_id="inc-checkout-20260603-0900" | sort _time | table _time signal_domain service event_type risk_score evidence_ref message
dispatch.earliest_time = -24h
dispatch.latest_time = now
disabled = 0

[Incident Command - Root Cause Evidence]
search = index=agentops_events incident_id="inc-checkout-20260603-0900" root_cause_candidate!="incident_response_coordination" | stats sum(root_cause_weight) as evidence_score values(signal_domain) as domains values(evidence_ref) as evidence by root_cause_candidate | sort -evidence_score
dispatch.earliest_time = -24h
dispatch.latest_time = now
disabled = 0

[Incident Command - Human Approved Remediation Ledger]
search = index=agentops_events requires_human_approval=true OR policy_decision="deny" | sort -risk_score | table _time service external_action approval_state policy_decision runbook_action evidence_ref
dispatch.earliest_time = -24h
dispatch.latest_time = now
disabled = 0

[Incident Command - Splunk MCP Investigation Context]
search = index=agentops_events mcp_tool!="none" OR signal_domain="ai_correlation" | table _time component mcp_tool event_type evidence_ref recommended_human_action
dispatch.earliest_time = -24h
dispatch.latest_time = now
disabled = 0

[Incident Command - Blast Radius By Service]
search = index=agentops_events incident_id="inc-checkout-20260603-0900" | stats count max(risk_score) as max_risk values(signal_domain) as domains by service | sort -max_risk
dispatch.earliest_time = -24h
dispatch.latest_time = now
disabled = 0
